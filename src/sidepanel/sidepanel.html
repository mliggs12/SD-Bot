<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      margin: 0;
    }
    #requester-info {
      margin-bottom: 16px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    #requester-info p {
      margin: 8px 0;
    }
    #result {
      padding: 12px;
      border-radius: 4px;
      margin-top: 16px;
    }
    .success {
      background: #d4edda;
      border-left: 4px solid #28a745;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      border-left: 4px solid #dc3545;
      color: #721c24;
    }
    .warning {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      color: #856404;
    }
    .picker-title {
      font-weight: bold;
      margin-bottom: 8px;
    }
    .picker-hint {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }
    .requester-btn {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 14px;
      text-align: left;
      background: #fff;
      border: 1px solid #ced4da;
      border-radius: 4px;
      cursor: pointer;
    }
    .requester-btn:hover {
      background: #e7f1ff;
      border-color: #0d6efd;
    }
    .requester-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }
  </style>
</head>
<body>
  <div id="requester-info">
    <p>Name: <span id="requester-name"></span></p>
    <p>Phone: <span id="phone-number"></span></p>
    <p>Assets: <span id="laptop-serial"></span></p>
  </div>
  
  <div id="result"></div>
  
  <script src="../sidepanel.js"></script>
</body>
</html>
